<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Memorial</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 28px;
      background: #020617;
    }

    button {
      margin: 10px;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .conteudo {
      display: none;
      margin: 20px auto;
      width: 60%;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>✨ Meu Memorial ✨</header>

<div>
  <button onclick="abrir('carater')">Caráter</button>
  <button onclick="abrir('profissional')">Profissional</button>
  <button onclick="abrir('familia')">Família</button>
</div>

<div id="carater" class="conteudo">
  <h2>Caráter</h2>
  <p>Quero ser uma pessoa honesta, forte e persistente, mantendo meus valores mesmo nas dificuldades.</p>
</div>

<div id="profissional" class="conteudo">
  <h2>Profissional</h2>
  <p>Quero trabalhar com tecnologia e criar projetos e jogos que impactem as pessoas.</p>
</div>

<div id="familia" class="conteudo">
  <h2>Família</h2>
  <p>Quero construir uma família baseada em respeito, apoio e união.</p>
</div>

<script>
function abrir(secao) {
  var conteudos = document.getElementsByClassName("conteudo");

  for (var i = 0; i < conteudos.length; i++) {
    conteudos[i].style.display = "none";
  }

  document.getElementById(secao).style.display = "block";
}
</script>

</body>
</html>
